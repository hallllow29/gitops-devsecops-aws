apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-app
  namespace: dev-services
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
spec:
  rules:
    - host: dev.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-app
                port:
                  number: 80